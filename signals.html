<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMoose - Trading Signals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .signals-container {
            display: flex;
            height: calc(100vh - 60px);
            margin-top: 60px;
        }

        .sidebar {
            width: 300px;
            background-color: #1a1d1e;
            padding: 20px;
            border-right: 1px solid #2d2d2d;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .main-signals {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #121212;
        }

        .pair-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            overflow-y: auto;
            padding-right: 4px;
            margin-top: 0.5rem;
            height: 100%;
        }

        .pair-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: #0f1112;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            min-width: 0;
        }

        .pair-item:hover {
            background-color: #383838;
        }

        .pair-name {
            display: flex;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Roboto Mono', monospace;
            min-width: 0;
            flex: 1;
        }

        .pair-name i {
            font-size: 9px;
            opacity: 0.5;
        }

        .pair-price {
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
            text-align: right;
            white-space: nowrap;
            margin-left: 8px;
            min-width: 70px;
        }

        .price-up { color: #00ff9d; }
        .price-down { color: #ff3b30; }
        .price-unchanged { color: rgba(255, 255, 255, 0.7); }

        .signals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .signal-card {
            background: #0f1112;
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .signal-type {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .signal-type.buy {
            background: rgba(0, 255, 157, 0.1);
            color: #00ff9d;
        }

        .signal-type.sell {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
        }

        .signal-pair {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .signal-price {
            font-family: 'Roboto Mono', monospace;
            color: rgba(255, 255, 255, 0.7);
        }

        .signal-time {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .connection-status {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #1a1d1e;
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .status-indicator {
            border-radius: 50%;
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #ff3b30;
            transition: background-color 0.2s ease;
        }

        .status-indicator.connected {
            background: #00ff9d;
        }

        .htx-promo {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .htx-logo {
            width: 120px;
            height: auto;
            margin-bottom: 1rem;
        }

        .htx-promo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .htx-button {
            display: inline-block;
            background: #00ff9d;
            color: #000000;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .htx-button:hover {
            opacity: 0.9;
        }

        .signals-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .signals-nav button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .signals-nav button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .signals-nav button.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .sidebar-title {
            color: #00ff9d;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title i {
            color: #00ff9d;
            font-size: 12px;
        }

        .search-status {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #00ff9d;
            font-size: 0.8rem;
        }

        .search-status i {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .signals-grid {
                grid-template-columns: 1fr;
            }
            .sidebar {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid #2d2d2d;
            }
            .signals-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="images/moose.png" alt="CryptoMoose Logo" class="logo">
                CryptoMoose
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/signals.html">Signals</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings.html">Settings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Signals Container -->
    <div class="signals-container">
        <!-- Sidebar with Monitored Pairs -->
        <div class="sidebar">
            <div class="sidebar-title">
                <i class="fas fa-chart-line"></i>
                Monitored Pairs
            </div>
            <div class="search-status">
                <i class="fas fa-search"></i>
                Scanning
            </div>
            <div class="pair-list">
                <!-- Pairs will be dynamically added here -->
            </div>
            <div class="htx-promo">
                <a href="https://www.htx.com/invite/en-us/1f?invite_code=5duia223" target="_blank">
                    <img src="./images/htx-logo.png" alt="HTX Logo" class="htx-logo">
                </a>
                <p>Trade with confidence on HTX - One of the world's leading cryptocurrency exchanges. Get exclusive benefits using our referral link!</p>
                <a href="https://www.htx.com/invite/en-us/1f?invite_code=5duia223" target="_blank" class="htx-button">
                    Start Trading
                </a>
            </div>
        </div>

        <!-- Main Signals Area -->
        <div class="main-signals">
            <div class="signals-nav">
                <button class="active">All Signals</button>
                <button>Buy Signals</button>
                <button>Sell Signals</button>
            </div>
            <div class="signals-grid">
                <!-- Signal cards will be dynamically added here -->
            </div>
        </div>
    </div>

    <!-- Connection Status -->
    <div class="connection-status">
        <div class="status-indicator"></div>
        <span>Connecting...</span>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { signalsDisplay } from './js/signals-display.js';
        // Initialize signals display when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Initializing signals display...');
            signalsDisplay.init();
        });
    </script>
</body>
</html>
