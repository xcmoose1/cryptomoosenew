<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMoose News Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-bg: #0a0b0c;
            --color-surface: #16181a;
            --color-primary: #00ff9d;
            --color-secondary: #94a3b8;
            --color-text: #ffffff;
            --color-text-dim: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-top: 80px;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header-section {
            text-align: center;
            margin: 0.8rem 0 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 0.25rem;
        }

        .header-section p {
            color: var(--color-text-dim);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .news-meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--color-text-dim);
        }

        .news-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .news-meta i {
            color: var(--color-primary);
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .news-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .news-section:hover {
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0, 255, 157, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-icon i {
            font-size: 1.2rem;
            color: var(--color-primary);
        }

        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--color-text);
            margin: 0;
        }

        .section-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--color-text);
        }

        .section-content p {
            margin-bottom: 1rem;
        }

        .section-content ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .section-content li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .section-content li:before {
            content: "•";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }

        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .error-state i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        .error-state h3 {
            font-size: 1.4rem;
            color: var(--color-text);
            margin: 1rem 0;
        }

        .error-state p {
            color: var(--color-text-dim);
        }

        .nav {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            gap: 0.5rem;
        }

        .logo-container img {
            height: 32px;
            width: auto;
        }

        .nav-link {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link i {
            font-size: 1rem;
        }

        .nav-link span {
            font-size: 0.9rem;
        }

        .nav-link.twitter {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            margin-left: 12px;
        }

        .nav-link.twitter:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media screen and (max-width: 992px) {
            .nav-content {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .nav-left, .nav-right {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-section {
                padding: 1.5rem;
                margin: 0.5rem 0 1.5rem;
            }

            .news-meta {
                flex-direction: column;
                gap: 1rem;
                align-items: center;
            }

            .news-section {
                padding: 1.2rem;
            }

            .section-header {
                margin-bottom: 1rem;
            }

            .section-header h2 {
                font-size: 1.2rem;
            }
        }

        .digest-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .digest-section:hover {
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .section-header i {
            color: var(--color-primary);
            font-size: 1.5rem;
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--color-text);
        }

        .section-content {
            color: var(--color-text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .section-content ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .section-content li {
            margin-bottom: 0.8rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .section-content li:before {
            content: "•";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }

        .highlight {
            color: var(--color-primary);
            font-weight: 500;
        }

        .confidence {
            font-size: 0.85rem;
            color: var(--color-secondary);
            margin-left: 0.5rem;
        }

        .next-update {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: var(--color-text-dim);
        }

        #countdown {
            color: var(--color-primary);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <div class="nav-left">
                <a href="index.html" class="logo-container">
                    <img src="images/moose.png" alt="CryptoMoose" style="height: 32px; width: auto;">
                    <span>CryptoMoose</span>
                </a>
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>Dashboard</span>
                </a>
                <a href="signals.html" class="nav-link">
                    <i class="fas fa-signal"></i>
                    <span>Signals</span>
                </a>
                <a href="segment-projections.html" class="nav-link">
                    <i class="fas fa-layer-group"></i>
                    <span>Segment Projections</span>
                </a>
                <a href="members.html" class="nav-link">
                    <i class="fas fa-robot"></i>
                    <span>AI Market Insights</span>
                </a>
            </div>
            <div class="nav-right">
                <a href="https://t.me/cryptomoose" target="_blank" class="btn-telegram">
                    <i class="fab fa-telegram"></i>
                    <span>Get Live Signals on Telegram</span>
                </a>
                <a href="https://x.com/XCryptoMoose" target="_blank" class="nav-link twitter">
                    <img src="images/x-logo.svg" alt="X (Twitter)" style="height: 16px; width: 16px;">
                    <span>Follow Alpha</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Daily Market Digest</h1>
            <p>Your comprehensive analysis of global events and their impact on crypto markets</p>
            <div class="next-update">
                Next update in: <span id="countdown">Loading...</span>
            </div>
        </div>

        <div id="digest-content">
            <div id="loading" style="text-align: center; padding: 2rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--color-primary);"></i>
                <p>Loading today's analysis...</p>
            </div>
        </div>
    </div>

    <script>
        function createDigestSection(title, content, icon) {
            const safeContent = content || 'No content available at this time.';
            
            return `
                <div class="digest-section">
                    <div class="section-header">
                        <i class="fas ${icon}"></i>
                        <h2>${title}</h2>
                    </div>
                    <div class="section-content">
                        ${safeContent.split('\n').map(line => {
                            if (!line.trim()) return '';
                            line = line.replace(/(\d+\.?\d*%?|\$\d+\.?\d*[KMB]?)/g, '<span class="highlight">$1</span>');
                            line = line.replace(/\(confidence:?\s*\d+%\)/gi, match => 
                                `<span class="confidence">${match}</span>`);
                            return `<li>${line}</li>`;
                        }).filter(Boolean).join('')}
                    </div>
                </div>
            `;
        }

        async function fetchDigestData() {
            try {
                const response = await fetch('http://localhost:3000/api/daily-digest', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                if (!response.ok) throw new Error('Failed to fetch digest');
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to load digest');
                }
                
                const data = result.data;
                if (!data || typeof data !== 'object') {
                    throw new Error('Invalid data format received');
                }
                
                updateUI(data);
                localStorage.setItem('lastDigest', JSON.stringify({
                    data,
                    timestamp: new Date().getTime(),
                    nextUpdate: result.nextUpdate
                }));

                // Update the countdown based on the next update time
                updateCountdown(result.nextUpdate);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('digest-content').innerHTML = `
                    <div class="digest-section" style="text-align: center;">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444; font-size: 2rem;"></i>
                        <p>Failed to load the daily digest: ${error.message}</p>
                        <button onclick="loadDigest()" class="btn-action">
                            Retry
                        </button>
                    </div>
                `;
            }
        }

        function updateCountdown(nextUpdateTime) {
            const updateInterval = setInterval(() => {
                const now = new Date().getTime();
                const next = new Date(nextUpdateTime).getTime();
                const diff = next - now;

                if (diff <= 0) {
                    clearInterval(updateInterval);
                    loadDigest(); // Reload when time is up
                    return;
                }

                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('countdown').textContent = 
                    `${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

        async function loadDigest() {
            const cached = JSON.parse(localStorage.getItem('lastDigest'));
            if (cached && cached.nextUpdate && new Date().getTime() < new Date(cached.nextUpdate).getTime()) {
                updateUI(cached.data);
                updateCountdown(cached.nextUpdate);
            } else {
                await fetchDigestData();
            }
        }

        function updateUI(data) {
            const content = document.getElementById('digest-content');
            if (!data || typeof data !== 'object') {
                content.innerHTML = `
                    <div class="digest-section" style="text-align: center;">
                        <i class="fas fa-exclamation-circle" style="color: #ef4444; font-size: 2rem;"></i>
                        <p>No data available. Please try again later.</p>
                        <button onclick="loadDigest()" class="btn-action">
                            Retry
                        </button>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                ${createDigestSection('Global Context', data.globalContext, 'fa-globe')}
                ${createDigestSection('Market Analysis', data.marketAnalysis, 'fa-chart-line')}
                ${createDigestSection('Sector Impact', data.sectorImpact, 'fa-layer-group')}
                ${createDigestSection('Actionable Insights', data.actionableInsights, 'fa-lightbulb')}
                ${createDigestSection('Forward Outlook', data.outlook, 'fa-binoculars')}
            `;
        }

        // Initial load
        loadDigest();

        // Update countdown every second
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
