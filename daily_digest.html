<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMoose News Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-bg: #0a0b0c;
            --color-surface: #16181a;
            --color-primary: #00ff9d;
            --color-secondary: #94a3b8;
            --color-text: #ffffff;
            --color-text-dim: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-top: 80px;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header-section {
            text-align: center;
            margin: 0.8rem 0 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 0.25rem;
        }

        .header-section p {
            color: var(--color-text-dim);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .news-meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--color-text-dim);
        }

        .news-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .news-meta i {
            color: var(--color-primary);
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .news-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .news-section:hover {
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0, 255, 157, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-icon i {
            font-size: 1.2rem;
            color: var(--color-primary);
        }

        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--color-text);
            margin: 0;
        }

        .section-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--color-text);
        }

        .section-content p {
            margin-bottom: 1rem;
        }

        .section-content ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .section-content li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .section-content li:before {
            content: "•";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }

        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .error-state i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        .error-state h3 {
            font-size: 1.4rem;
            color: var(--color-text);
            margin: 1rem 0;
        }

        .error-state p {
            color: var(--color-text-dim);
        }

        .nav {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            gap: 0.5rem;
        }

        .logo-container img {
            height: 32px;
            width: auto;
        }

        .nav-link {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link i {
            font-size: 1rem;
        }

        .nav-link span {
            font-size: 0.9rem;
        }

        .nav-link.twitter {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            margin-left: 12px;
        }

        .nav-link.twitter:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media screen and (max-width: 992px) {
            .nav-content {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .nav-left, .nav-right {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-section {
                padding: 1.5rem;
                margin: 0.5rem 0 1.5rem;
            }

            .news-meta {
                flex-direction: column;
                gap: 1rem;
                align-items: center;
            }

            .news-section {
                padding: 1.2rem;
            }

            .section-header {
                margin-bottom: 1rem;
            }

            .section-header h2 {
                font-size: 1.2rem;
            }
        }

        .digest-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .digest-section:hover {
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .section-header i {
            color: var(--color-primary);
            font-size: 1.5rem;
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--color-text);
        }

        .section-content {
            color: var(--color-text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .section-content ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .section-content li {
            margin-bottom: 0.8rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .section-content li:before {
            content: "•";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }

        .highlight {
            color: var(--color-primary);
            font-weight: 500;
        }

        .confidence {
            font-size: 0.85rem;
            color: var(--color-secondary);
            margin-left: 0.5rem;
        }

        .next-update {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: var(--color-text-dim);
        }

        #countdown {
            color: var(--color-primary);
            font-weight: 500;
        }

        .article {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .article h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .article h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--color-text);
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .article p {
            margin-bottom: 1.5rem;
            color: var(--color-text-dim);
        }

        .article strong {
            color: var(--color-text);
            font-weight: 600;
        }

        .article em {
            color: var(--color-primary);
            font-style: normal;
        }

        .highlight-box {
            background: rgba(0, 255, 157, 0.1);
            border-left: 4px solid var(--color-primary);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 8px 8px 0;
        }

        .highlight-box h3 {
            color: var(--color-primary);
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .highlight-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .highlight-box li {
            margin-bottom: 0.8rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .highlight-box li:before {
            content: "→";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }

        .headline {
            background: linear-gradient(90deg, var(--color-primary) 0%, rgba(0, 255, 157, 0.1) 100%);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .headline h1 {
            font-size: 2.8rem;
            line-height: 1.3;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #fff 0%, #00ff9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .insight-box {
            background: rgba(0, 255, 157, 0.05);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid rgba(0, 255, 157, 0.1);
        }

        .insight-box h3 {
            color: var(--color-primary);
            font-size: 1.4rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .insight-box h3 i {
            font-size: 1.2rem;
        }

        .quote-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--color-primary);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        .quote-box cite {
            display: block;
            margin-top: 1rem;
            color: var(--color-primary);
            font-style: normal;
        }

        .market-indicators {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .indicator-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .indicator-card h4 {
            color: var(--color-text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .indicator-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .indicator-card .trend {
            font-size: 0.9rem;
            color: var(--color-text-dim);
        }

        .key-takeaway {
            background: linear-gradient(90deg, rgba(0, 255, 157, 0.1) 0%, rgba(0, 255, 157, 0.05) 100%);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
        }

        .key-takeaway h3 {
            color: var(--color-primary);
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .key-takeaway ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .key-takeaway li {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .key-takeaway li:before {
            content: "→";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }

        @media (max-width: 768px) {
            .article {
                padding: 1.5rem;
            }

            .article h1 {
                font-size: 2rem;
            }

            .article h2 {
                font-size: 1.5rem;
            }

            .market-indicators {
                grid-template-columns: 1fr;
            }

            .article-meta {
                flex-direction: column;
                gap: 1rem;
            }
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-dim);
            font-size: 0.9rem;
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .article-meta i {
            color: var(--color-primary);
        }

        .key-points {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .key-points h3 {
            color: var(--color-primary);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .key-points ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .key-points li {
            margin-bottom: 0.8rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .key-points li:before {
            content: "•";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }

        .refresh-btn {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: rgba(0, 255, 157, 0.2);
        }

        .refresh-btn i {
            font-size: 0.9rem;
        }

        .digest-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(0, 255, 157, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 157, 0.1);
        }

        .whale-activity {
            background: linear-gradient(90deg, rgba(0, 255, 157, 0.1) 0%, rgba(0, 255, 157, 0.05) 100%);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
        }

        .whale-activity h3 {
            color: var(--color-primary);
            font-size: 1.4rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .whale-activity ul {
            list-style: none;
            padding: 0;
        }

        .whale-activity li {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .whale-activity li:before {
            content: "→";
            color: var(--color-primary);
            position: absolute;
            left: 0;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <div class="nav-left">
                <a href="index.html" class="logo-container">
                    <img src="images/moose.png" alt="CryptoMoose" style="height: 32px; width: auto;">
                    <span>CryptoMoose</span>
                </a>
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>Dashboard</span>
                </a>
                <a href="signals.html" class="nav-link">
                    <i class="fas fa-signal"></i>
                    <span>Signals</span>
                </a>
                <a href="segment-projections.html" class="nav-link">
                    <i class="fas fa-layer-group"></i>
                    <span>Segment Projections</span>
                </a>
                <a href="members.html" class="nav-link">
                    <i class="fas fa-robot"></i>
                    <span>AI Market Insights</span>
                </a>
            </div>
            <div class="nav-right">
                <a href="https://t.me/cryptomoose" target="_blank" class="btn-telegram">
                    <i class="fab fa-telegram"></i>
                    <span>Get Live Signals on Telegram</span>
                </a>
                <a href="https://x.com/XCryptoMoose" target="_blank" class="nav-link twitter">
                    <img src="images/x-logo.svg" alt="X (Twitter)" style="height: 16px; width: 16px;">
                    <span>Follow Alpha</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Daily Market Digest</h1>
            <p>Your comprehensive analysis of global events and their impact on crypto markets</p>
            <div class="digest-meta">
                <span><i class="far fa-clock"></i> Last Updated: <span id="lastUpdate"></span></span>
                <span><i class="fas fa-sync-alt"></i> Next Update: <span id="countdown"></span></span>
                <button onclick="fetchDigestData(true)" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Refresh Now
                </button>
            </div>
        </div>

        <div id="digest-content">
            <div id="loading" style="text-align: center; padding: 2rem;">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading market digest...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchDigestData(forceRefresh = false) {
            try {
                const url = forceRefresh ? '/api/daily-digest?refresh=true' : '/api/daily-digest';
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch digest');
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Failed to load digest');
                }

                // Update timestamps
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                if (data.nextUpdate) {
                    updateCountdown(new Date(data.nextUpdate));
                }

                // Format content
                // Combine all sections into a single article
                const sections = [
                    data.data.globalContext,
                    data.data.marketAnalysis,
                    data.data.sectorImpact,
                    data.data.actionableInsights,
                    data.data.outlook
                ];
                
                const content = sections.join('\n\n');
                const formattedContent = formatArticleContent(content);
                document.getElementById('digest-content').innerHTML = formattedContent;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('digest-content').innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Temporarily Unavailable</h3>
                        <p>Our analysts are currently processing the latest market data. Please try again in a few minutes.</p>
                        <button onclick="fetchDigestData(true)" class="refresh-btn">
                            <i class="fas fa-sync-alt"></i> Try Again
                        </button>
                    </div>
                `;
            }
        }

        function formatArticleContent(content) {
            // Convert markdown headers to HTML
            let formattedContent = content
                .replace(/^# (.+)$/gm, '<h2>$1</h2>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/^### (.+)$/gm, '<h4>$1</h4>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');

            return `
                <div class="article">
                    <div class="content">
                        ${formattedContent}
                    </div>
                </div>
            `;
        }

        // Initial load
        fetchDigestData();
    </script>
</body>
